name: MCP Eval

# Outcome-invariant eval: a REAL model drives the MCP server through several
# realistic editorial SCENARIOS (blog post, article under a list page, a
# Norwegian article), and the harness asserts OUTCOME INVARIANTS on every
# document produced — reachable, real name, published, visible-where-meant
# (type === parent listedType), complete, right language branch. Each
# production incident this project hit maps to one of those checks, so the net
# catches the NEXT one before a human does. The parity suite locks the contract;
# this locks whether a real model lands a GOOD OUTCOME.
#
# Runs on every push/PR to main AND weekly + on demand — this is the proactive
# net, so it gates changes, not just a weekly heartbeat. It calls the paid
# Anthropic API; if the ANTHROPIC_API_KEY secret is not configured the job
# exits 0 with a notice (green-not-failed) so forks/unconfigured repos stay
# green and the push gate never blocks on a missing key.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  eval:
    name: MCP usability eval (real model)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paperboy
          POSTGRES_PASSWORD: paperboy
          POSTGRES_DB: paperboy_eval
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U paperboy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://paperboy:paperboy@localhost:5433/paperboy_eval
      EVAL_MODEL: claude-haiku-4-5-20251001

    steps:
      # First step: if the API key secret is empty, skip the rest gracefully.
      # The job stays GREEN (not failed) when the secret isn't configured.
      - name: Check for ANTHROPIC_API_KEY secret
        id: guard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY is not configured — skipping the MCP eval (exiting green)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.guard.outputs.run == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.run == 'true'
        # version comes from "packageManager" in package.json

      - uses: actions/setup-node@v5
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        if: steps.guard.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Seed the eval database
        if: steps.guard.outputs.run == 'true'
        # Values mirror apps/api/test/helpers.ts so the eval can log in as the
        # seed admin (MCP_EMAIL/MCP_PASSWORD default to these).
        env:
          SEED_ADMIN_EMAIL: admin@paperboy.test
          SEED_ADMIN_PASSWORD: Admin!Passw0rd
          PAPERBOY_PUBLIC_KEY: pk_live_test_public
          PAPERBOY_PREVIEW_KEY: prv_test_preview
        run: pnpm --filter @paperboy/db seed

      - name: Run the MCP eval
        if: steps.guard.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node evals/mcp-eval.mjs
