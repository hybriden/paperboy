name: MCP Eval

# Outcome-invariant eval: drives the MCP server through realistic editorial
# SCENARIOS (blog post, article under a list page, a Norwegian article) and
# asserts OUTCOME INVARIANTS on every document produced — reachable, real name,
# published, visible-where-meant (type === parent listedType), complete, right
# language branch. Each production incident this project hit maps to one of
# those checks, so the net catches the NEXT one before a human does.
#
# TWO DRIVERS, by trigger — so the push gate is FREE and deterministic:
#   • push / PR → --mock: a deterministic scripted driver (real MCP tool calls,
#     NO model, NO API key, NO cost). This is the proactive gate. The invariant
#     net is identical, so it catches every SYSTEM regression.
#   • schedule / manual → real model (paid Anthropic API): tests tool-description
#     drift, which only a real model can. Skips green if no key is configured.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  eval:
    name: MCP outcome-invariant eval
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paperboy
          POSTGRES_PASSWORD: paperboy
          POSTGRES_DB: paperboy_eval
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U paperboy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://paperboy:paperboy@localhost:5433/paperboy_eval
      EVAL_MODEL: claude-haiku-4-5-20251001

    steps:
      # Decide the driver from the trigger. push/PR → mock (free, always runs).
      # schedule/manual → real model, but only if the API key is configured
      # (else skip green so forks / unconfigured repos don't show red).
      - name: Decide driver
        id: mode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "mode=mock" >> "$GITHUB_OUTPUT"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::push/PR → running the MCP eval in --mock mode (deterministic, no API calls)."
          elif [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "mode=real" >> "$GITHUB_OUTPUT"
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY is not configured — skipping the real-model eval (exiting green)."
          else
            echo "mode=real" >> "$GITHUB_OUTPUT"
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.mode.outputs.run == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.mode.outputs.run == 'true'
        # version comes from "packageManager" in package.json

      - uses: actions/setup-node@v5
        if: steps.mode.outputs.run == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        if: steps.mode.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Seed the eval database
        if: steps.mode.outputs.run == 'true'
        # Values mirror apps/api/test/helpers.ts so the eval can log in as the
        # seed admin (MCP_EMAIL/MCP_PASSWORD default to these).
        env:
          SEED_ADMIN_EMAIL: admin@paperboy.test
          SEED_ADMIN_PASSWORD: Admin!Passw0rd
          PAPERBOY_PUBLIC_KEY: pk_live_test_public
          PAPERBOY_PREVIEW_KEY: prv_test_preview
        run: pnpm --filter @paperboy/db seed

      - name: Run the MCP eval (mock — deterministic, no API)
        if: steps.mode.outputs.run == 'true' && steps.mode.outputs.mode == 'mock'
        run: node evals/mcp-eval.mjs --mock

      - name: Run the MCP eval (real model)
        if: steps.mode.outputs.run == 'true' && steps.mode.outputs.mode == 'real'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node evals/mcp-eval.mjs
