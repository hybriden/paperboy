name: CI

# Least privilege: CI only reads the repo. Without this block the workflow would
# inherit the repo/org default GITHUB_TOKEN (often write-capable) while running
# untrusted PR code (pnpm install lifecycle scripts, Vite/Next builds, docker build).
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# GitHub forces JS actions onto Node 24 from 2026-06-16; opt in early so a
# breakage is discovered while it's still a choice (revert this env to roll back).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: typecheck · test · build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paperboy
          POSTGRES_PASSWORD: paperboy
          POSTGRES_DB: paperboy_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U paperboy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        # version comes from "packageManager" in package.json

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: API tests (Vitest + Postgres)
        run: pnpm --filter @paperboy/api test
        env:
          # The suite migrates + seeds this database itself (isolated per run).
          TEST_DATABASE_URL: postgresql://paperboy:paperboy@localhost:5433/paperboy_test

      - name: Admin unit tests (Vitest)
        run: pnpm --filter @paperboy/admin test

      - name: Build admin (Vite)
        run: pnpm --filter @paperboy/admin build

      - name: Build web (Next.js)
        run: pnpm --filter @paperboy/web build

  e2e:
    name: e2e (Playwright vs composed stack)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm --filter @paperboy/admin exec playwright install --with-deps chromium

      - name: Start the full stack (db → migrate+seed → api → web → admin)
        # COOKIE_SECURE=false: the suite logs in over http://localhost:8090
        # (the same reason live-deploy runs need ADMIN_URL=https://…).
        run: docker compose up -d --build --wait
        env:
          COOKIE_SECURE: "false"
          ALLOW_INSECURE_COOKIES: "true"
          # 30 tests + retries from one runner IP — the production limits
          # (10 logins/min, 300 requests/min) would turn a single slow test
          # into a 429 cascade that reads as flaky "element not visible".
          LOGIN_RATE_MAX: "1000"
          RATE_LIMIT_MAX: "10000"

      - name: Wait for admin + api
        run: |
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://localhost:8091/health
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS -o /dev/null http://localhost:8090

      - name: Run e2e suite
        run: pnpm --filter @paperboy/admin test:e2e

      - name: Stack logs (on failure)
        if: failure()
        run: docker compose logs --tail 200 api admin web

      - name: Upload traces/screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts
          path: |
            apps/admin/test-results/
          retention-days: 7
