server {
  listen 8090;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Media uploads can be up to 5 MB at the API; allow headroom for multipart
  # overhead so nginx proxies the request instead of returning an HTML 413
  # (which the SPA would try to JSON.parse). Keep in sync with the API limit.
  client_max_body_size 8m;

  # SPA static assets with hashed names — cache aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy the Management/Delivery API to the api container (same-origin for the SPA).
  # Use Docker's embedded DNS resolver + a variable upstream so nginx resolves
  # "api" at request time (doesn't crash at boot if api is momentarily unresolvable,
  # and survives api restarts).
  location /api/ {
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $paperboy_api http://api:8091;
    proxy_pass $paperboy_api;
    proxy_http_version 1.1;
    # $http_host preserves the port (unlike $host) so the API's same-origin CSRF
    # check sees a Host that matches the browser's Origin (e.g. host:8090).
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin $http_origin;
  }

  # The entry point must NEVER be cached, or a browser keeps an old index.html
  # that references hashed chunks deleted by the next deploy → "Failed to fetch
  # dynamically imported module". Hashed /assets/ stay immutable (above).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # SPA fallback — also no-cache (it resolves to index.html for client routes).
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
