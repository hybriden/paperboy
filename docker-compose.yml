services:
  db:
    image: postgres:16-alpine
    container_name: paperboy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperboy
      POSTGRES_PASSWORD: paperboy
      POSTGRES_DB: paperboy
    ports:
      - "5433:5432"
    volumes:
      - paperboy-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperboy -d paperboy"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply migrations + seed demo content, then exit.
  init:
    build: { context: ., target: app }
    image: paperboy/app:latest
    command: ["pnpm", "--filter", "@paperboy/db", "seed"]
    environment:
      DATABASE_URL: postgresql://paperboy:paperboy@db:5432/paperboy
      SEED_ADMIN_EMAIL: admin@paperboy.test
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin!Passw0rd}
      PAPERBOY_PUBLIC_KEY: ${PAPERBOY_PUBLIC_KEY:-pk_live_seed_public_key_value}
      PAPERBOY_PREVIEW_KEY: ${PAPERBOY_PREVIEW_KEY:-prv_seed_preview_key_value}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: { context: ., target: app }
    image: paperboy/app:latest
    command: ["pnpm", "--filter", "@paperboy/api", "start"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://paperboy:paperboy@db:5432/paperboy
      API_PORT: "8091"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8090}
      COOKIE_SECURE: ${COOKIE_SECURE:-true} # behind Cloudflare (HTTPS) → Secure __Host- cookie
      ALLOW_INSECURE_COOKIES: ${ALLOW_INSECURE_COOKIES:-false} # set true only for a non-TLS LAN demo
      SESSION_SECRET: ${SESSION_SECRET:-prod-session-secret-please-override-32+chars}
      CSRF_SECRET: ${CSRF_SECRET:-prod-csrf-secret-please-override-32+chars}
      # Encryption key for TOTP secrets at rest. Pin this when rotating SESSION_SECRET
      # so existing 2FA enrolments keep decrypting (else fall back to SESSION_SECRET).
      MFA_SECRET: ${MFA_SECRET:-}
      MEDIA_PUBLIC_BASE: ${MEDIA_PUBLIC_BASE:-} # empty = relative media URLs (same-origin via each app's proxy; works on any host)
      UPLOADS_DIR: /app/uploads
      # AI assistant: passes through from the host if set; falls back to offline heuristics otherwise.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    ports:
      - "8091:8091"
    volumes:
      - paperboy-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: { context: ., target: app }
    image: paperboy/app:latest
    command: ["pnpm", "--filter", "@paperboy/web", "start"]
    environment:
      NODE_ENV: production
      PAPERBOY_API_URL: http://api:8091
      PAPERBOY_PUBLIC_KEY: ${PAPERBOY_PUBLIC_KEY:-pk_live_seed_public_key_value}
      PAPERBOY_PREVIEW_KEY: ${PAPERBOY_PREVIEW_KEY:-prv_seed_preview_key_value}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-dev-preview-secret-change-me}
      # Admin origins allowed to embed the preview iframe (CSP frame-ancestors). Comma-separated.
      ADMIN_ORIGINS: ${ADMIN_ORIGINS:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8092:8092"
    # Reference frontend (apps/web), reachable at http://localhost:8092.
    # In production you'd deploy your own front end that reads the public
    # Delivery API over HTTP — this one ships so the stack works out of the box.

  admin:
    build:
      context: .
      target: admin
      args:
        # Public origin of the web frontend; the preview iframe loads pages from here.
        VITE_WEB_URL: ${VITE_WEB_URL:-}
        VITE_PREVIEW_SECRET: ${PREVIEW_SECRET:-dev-preview-secret-change-me}
    image: paperboy/admin:latest
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8090:8090"

  # Paperboy MCP over Streamable HTTP — for remote MCP clients (e.g. harmonix).
  # Opt-in via the "mcp" profile so the default stack stays unchanged. Requires an
  # MCP token (Settings → MCP) which doubles as the Bearer credential clients send.
  #   MCP_TOKEN=mcp_… docker compose --profile mcp up -d --no-deps mcp
  # In production, front it with TLS (e.g. Caddy → paperboy-mcp.<host> → mcp:8093).
  mcp:
    build: { context: ., target: app }
    image: paperboy/app:latest
    command: ["pnpm", "--filter", "@paperboy/mcp", "start"]
    profiles: ["mcp"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://paperboy:paperboy@db:5432/paperboy
      MCP_HTTP_PORT: "8093"
      MCP_TOKEN: ${MCP_TOKEN:-} # mint one in Settings → MCP; the server refuses to start in HTTP mode without it
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8093:8093"
    networks:
      default: {}
      # Join the Cloudflare Tunnel network so sibling stacks (e.g. harmonix) can
      # reach this MCP by name at http://paperboy-mcp:8093/mcp — no public route.
      cloudflared:
        aliases: [paperboy-mcp]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8093/health"]
      interval: 5s
      timeout: 5s
      retries: 12

networks:
  cloudflared:
    name: cloudflared_default
    external: true

volumes:
  paperboy-pgdata:
  paperboy-uploads:
